<html lang="pt-BR">

<title>Mapa de Lojas — Minas Gerais</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;background:#f0f4f8}
#app{display:flex;flex-direction:column;height:100vh}

#top{
  background:#fff;border-bottom:1px solid #d1dce8;
  padding:0 18px;height:52px;display:flex;align-items:center;gap:14px;
  flex-shrink:0;z-index:500;position:relative;
  box-shadow:0 2px 12px rgba(15,50,100,.08)
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.logo-text{font-size:13px;font-weight:800;color:#0d2d4e;line-height:1.2}
.logo-text small{display:block;font-size:9px;font-weight:500;color:#64748b;letter-spacing:.3px}
.vsep{width:1px;height:26px;background:#e2eaf2;flex-shrink:0}

.fg{display:flex;flex-direction:column;gap:2px}
.fl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8}
.sw{position:relative}
.sw select{
  appearance:none;background:#f5f8fc;border:1.5px solid #cbd5e1;
  color:#1e3a5f;font-size:12px;font-weight:600;font-family:inherit;
  padding:5px 28px 5px 10px;border-radius:7px;cursor:pointer;outline:none;
  transition:all .18s;min-width:178px
}
.sw select:hover{border-color:#3b82f6}
.sw select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.sw.active select{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.arr{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:#94a3b8;font-size:9px}

.kpis{display:flex;gap:6px;margin-left:auto}
.kpi{background:#f5f8fc;border:1px solid #dde6f0;padding:3px 14px;border-radius:7px;text-align:center}
.kpi b{display:block;font-size:17px;font-weight:800;color:#0d2d4e;line-height:1.15}
.kpi small{display:block;font-size:7.5px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-top:1px}

#cbtn{
  display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;
  border:1.5px solid #e2eaf2;background:#f5f8fc;color:#94a3b8;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit;flex-shrink:0
}
#cbtn:hover,#cbtn.on{border-color:#e94560;color:#e94560;background:#fff5f6}

#map{flex:1;z-index:1}

#legend{
  position:absolute;top:64px;right:14px;
  background:rgba(255,255,255,.97);border:1px solid #d1dce8;border-radius:12px;
  padding:12px 14px;z-index:400;box-shadow:0 4px 20px rgba(15,50,100,.10);min-width:158px
}
#legend h4{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid #f0f4f8}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:4px;padding:3px 6px;border-radius:5px;cursor:pointer;transition:background .12s}
.lr:hover{background:#f5f8fc}
.lr.hl{background:#eff6ff}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.ln{flex:1;font-weight:500;color:#334155}
.lc{font-size:10px;font-weight:700;color:#94a3b8;background:#f0f4f8;padding:1px 6px;border-radius:6px}



.leaflet-control-zoom{border:none!important;border-radius:9px!important;overflow:hidden;box-shadow:0 2px 10px rgba(15,50,100,.15)!important}
.leaflet-control-zoom a{background:#fff!important;color:#334155!important;border-color:#d1dce8!important;width:30px!important;height:30px!important;line-height:30px!important}
.leaflet-control-zoom a:hover{background:#f5f8fc!important}
.leaflet-popup-content-wrapper{background:#fff;border:1px solid #d1dce8;border-radius:12px;box-shadow:0 8px 30px rgba(15,50,100,.15);color:#334155}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-content{margin:12px 15px}
.leaflet-control-attribution{background:rgba(255,255,255,.8)!important;color:#94a3b8!important;font-size:9px!important}
.leaflet-control-attribution a{color:#64748b!important}
</style>

// ── MAPA ─────────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[-18.5,-44.8],zoom:7,zoomControl:true});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

// ── CAMADAS ──────────────────────────────────────────────────────────────────
let estadoLayer = L.layerGroup().addTo(map);
let lojasLayer  = L.layerGroup().addTo(map);

// ── 1. LIMITE ESTADUAL MG ─────────────────────────────────────────────────────
fetch('https://raw.githubusercontent.com/giuliano-macedo/geodata-br-states/main/geojson/br_states/br_mg.json')
  .then(r => r.json())
  .then(geojsonMG => {
    var mg = L.geoJSON(geojsonMG, {
      style: { color:'#000000', weight:2.5, fillColor:'transparent', fillOpacity:0 }
    });
    estadoLayer.addLayer(mg);
    map.fitBounds(mg.getBounds());
  });


// ── 3. MARKERS LOJAS (geocoding via Nominatim) ───────────────────────────────
const storeMarkers = [];
const CACHE_KEY = 'lojas_mg_geocache_v4';

function makeIcon(col){
  return L.divIcon({
    className:'',
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${col};border:2.5px solid rgba(255,255,255,.88);box-shadow:0 2px 8px rgba(0,0,0,.6);cursor:pointer"></div>`,
    iconAnchor:[6,6], iconSize:[12,12]
  });
}

function makePopup(s, col){
  return `<div style="min-width:220px;max-width:280px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <span style="font-size:13px;font-weight:800;color:#0d2d4e">Loja ${s.id} — ${s.n}</span>
    </div>
    <div style="height:1px;background:#e2eaf2;margin-bottom:8px"></div>
    <table style="font-size:11px;border-collapse:collapse;width:100%">
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap">Filial</td><td style="color:#0d2d4e;font-weight:700;padding:3px 0 3px 10px">${s.n}</td></tr>
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap">Cidade</td><td style="color:#334155;font-weight:600;padding:3px 0 3px 10px">${s.city}</td></tr>
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap">Regional</td><td style="color:${col};font-weight:700;padding:3px 0 3px 10px">${s.r}</td></tr>
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap">Mesorregião</td><td style="color:#334155;font-weight:600;padding:3px 0 3px 10px">${s.meso}</td></tr>
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap">CNPJ</td><td style="color:#334155;font-weight:600;padding:3px 0 3px 10px">${s.cnpj}</td></tr>
      <tr><td style="color:#94a3b8;padding:3px 0;white-space:nowrap;vertical-align:top">Endereço</td><td style="color:#334155;font-weight:500;padding:3px 0 3px 10px;line-height:1.4">${s.addr}</td></tr>
    </table>
  </div>`;
}

function placeMarker(s, lat, lon){
  const col = COLORS[s.r] || '#888';
  const mk = L.marker([lat, lon], {icon: makeIcon(col), zIndexOffset:500});
  mk.storeData = s;
  mk.bindPopup(makePopup(s, col), {maxWidth:300});
  lojasLayer.addLayer(mk);
  storeMarkers.push(mk);
}

// Status bar
const statusEl = document.createElement('div');
statusEl.style.cssText='position:absolute;bottom:36px;right:14px;background:rgba(255,255,255,.95);border:1px solid #d1dce8;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:#334155;z-index:400;box-shadow:0 2px 8px rgba(15,50,100,.1)';
document.getElementById('map').appendChild(statusEl);

// Load cache
let cache = {};
try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e){}

// Separate cached vs needs geocoding
const needsGeocode = [];
STORES.forEach(s => {
  if(cache[s.id]){
    placeMarker(s, cache[s.id][0], cache[s.id][1]);
  } else {
    needsGeocode.push(s);
  }
});

if(needsGeocode.length === 0){
  statusEl.style.display='none';
} else {
  let idx = 0;
  let done = STORES.length - needsGeocode.length;

  statusEl.textContent = `Geocodificando lojas: ${done}/${STORES.length}`;

  function geocodeNext(){
    if(idx >= needsGeocode.length){
      try{ localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); }catch(e){}
      statusEl.textContent = `✓ ${STORES.length} lojas posicionadas`;
      setTimeout(()=>{ statusEl.style.display='none'; }, 3000);
      return;
    }
    const s = needsGeocode[idx++];
    // Use just street + city for better results
    const q = encodeURIComponent(s.addr + ', Brasil');
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=br`;

    fetch(url, {headers:{'User-Agent':'lojas-mg-map/1.0 (educational)'}})
      .then(r => r.json())
      .then(data => {
        let lat, lon;
        if(data && data.length > 0){
          lat = parseFloat(data[0].lat);
          lon = parseFloat(data[0].lon);
        } else {
          // fallback to city coords already in STORES
          lat = s.lat; lon = s.lon;
        }
        cache[s.id] = [lat, lon];
        placeMarker(s, lat, lon);
        done++;
        statusEl.textContent = `Geocodificando lojas: ${done}/${STORES.length}`;
        setTimeout(geocodeNext, 1100); // ~1 req/sec (Nominatim limit)
      })
      .catch(() => {
        // On error use fallback coords
        cache[s.id] = [s.lat, s.lon];
        placeMarker(s, s.lat, s.lon);
        done++;
        setTimeout(geocodeNext, 1100);
      });
  }

  geocodeNext();
}


// ── FILTRO ────────────────────────────────────────────────────────────────────
let selReg='', selMeso='';
const regC={}, mesoC={};
STORES.forEach(s=>{ regC[s.r]=(regC[s.r]||0)+1; mesoC[s.meso]=(mesoC[s.meso]||0)+1; });

const sReg = document.getElementById('sel-reg');
const sMeso = document.getElementById('sel-meso');

Object.keys(COLORS).forEach(r=>{
  if(!regC[r]) return;
  const o=document.createElement('option'); o.value=r;
  o.textContent=`${r}  (${regC[r]} lojas)`; sReg.appendChild(o);
});
Object.keys(mesoC).sort().forEach(m=>{
  const o=document.createElement('option'); o.value=m;
  o.textContent=`${m}  (${mesoC[m]})`; sMeso.appendChild(o);
});

document.getElementById('kn').textContent = STORES.length;

function applyFilter(){
  let vis=0;
  storeMarkers.forEach(mk=>{
    const s=mk.storeData;
    const show=(!selReg||s.r===selReg)&&(!selMeso||s.meso===selMeso);
    const el=mk.getElement();
    if(el){ el.style.opacity=show?'1':'0.05'; el.style.pointerEvents=show?'auto':'none'; }
    if(show) vis++;
  });
  document.getElementById('kn').textContent=vis;
  document.getElementById('cbtn').classList.toggle('on',!!(selReg||selMeso));
  document.querySelectorAll('.lr').forEach(r=>r.classList.toggle('hl',!!selReg&&r.dataset.r===selReg));
}

sReg.onchange=()=>{ selReg=sReg.value; document.getElementById('sw-reg').classList.toggle('active',!!selReg); applyFilter(); };
sMeso.onchange=()=>{ selMeso=sMeso.value; document.getElementById('sw-meso').classList.toggle('active',!!selMeso); applyFilter(); };
document.getElementById('cbtn').onclick=()=>{
  selReg=''; selMeso=''; sReg.value=''; sMeso.value='';
  ['sw-reg','sw-meso'].forEach(id=>document.getElementById(id).classList.remove('active'));
  applyFilter();
};

// ── LEGENDA ───────────────────────────────────────────────────────────────────
const legRows=document.getElementById('leg-rows');
Object.keys(COLORS).forEach(r=>{
  if(!regC[r]) return;
  const row=document.createElement('div');
  row.className='lr'; row.dataset.r=r;
  row.innerHTML=`<div class="ld" style="background:${COLORS[r]}"></div><span class="ln">${r}</span><span class="lc">${regC[r]}</span>`;
  row.onclick=()=>{
    if(selReg===r){selReg='';sReg.value='';document.getElementById('sw-reg').classList.remove('active');}
    else{selReg=r;sReg.value=r;document.getElementById('sw-reg').classList.add('active');}
    applyFilter();
  };
  legRows.appendChild(row);
});

// ── TOGGLES ───────────────────────────────────────────────────────────────────

} // end init
init();
}); // end loadScript
</script>
